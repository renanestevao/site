<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Liderança Assessoria</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.logo{
width:50%;
max-width:500px;
animation:logo 1.5s ease;
}

@keyframes logo{
0%{opacity:0; transform:scale(0.8)}
100%{opacity:1; transform:scale(1)}
}

h1{
font-size:40px;
margin-top:20px;
}

p{
font-size:18px;
opacity:0.8;
}

.botao{
background:#00c853;
padding:15px 35px;
border-radius:40px;
color:white;
text-decoration:none;
font-size:18px;
margin-top:20px;
display:inline-block;
transition:0.3s;
}

.botao:hover{
transform:scale(1.1);
background:#00e676;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
background:#25d366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
text-decoration:none;
box-shadow:0 0 20px rgba(0,0,0,0.4);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<h1>Liderança Assessoria</h1>

<p>Soluções profissionais para seu negócio</p>

<a class="botao" href="https://wa.me/SEUNUMERO">Fale Conosco</a>

<a class="whatsapp" href="https://wa.me/SEUNUMERO">
💬
</a>

</body>
</html>
