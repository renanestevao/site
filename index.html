<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
scroll-behavior:smooth;
}

/* MENU */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#020617;
position:sticky;
top:0;
z-index:10;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
flex-wrap:wrap;
}

header h2{
letter-spacing:1px;
margin:0;
}

.menu{
display:flex;
flex-wrap:wrap;
}

.menu a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:16px;
transition:0.3s;
}

.menu a:hover{
color:#22c55e;
}

/* HERO */

.hero{
text-align:center;
padding:110px 20px;
}

.logo{
width:520px;
max-width:100%;
height:auto;
animation:fade 1.5s ease;
}

@keyframes fade{
0%{opacity:0; transform:scale(0.9);}
100%{opacity:1; transform:scale(1);}
}

.hero h1{
font-size:44px;
margin-top:20px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

.botao{
background:#22c55e;
padding:16px 40px;
border-radius:40px;
text-decoration:none;
color:white;
font-size:18px;
display:inline-block;
margin-top:30px;
transition:0.3s;
}

.botao:hover{
transform:scale(1.05);
background:#16a34a;
}

/* SOBRE */

.sobre{
padding:90px 20px;
text-align:center;
background:#020617;
}

.sobre p{
max-width:700px;
margin:auto;
margin-top:15px;
}

.stats{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:60px;
margin-top:40px;
}

.stat{
font-size:36px;
font-weight:bold;
color:#22c55e;
}

/* SERVIÇOS */

.servicos{
padding:90px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:35px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:35px;
width:260px;
max-width:100%;
border-radius:14px;
transition:0.4s;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-12px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.card h3{
color:#22c55e;
}

/* CONTATO */

.contato{
background:#020617;
padding:90px 20px;
text-align:center;
}

/* RODAPÉ */

footer{
background:#020617;
padding:40px;
text-align:center;
font-size:14px;
opacity:0.8;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25d366;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
animation:pulse 2s infinite;
z-index:100;
}

.whatsapp img{
width:38px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

/* 📱 RESPONSIVO CELULAR */

@media (max-width: 768px){

header{
padding:15px 20px;
flex-direction:column;
align-items:flex-start;
}

.menu{
margin-top:10px;
}

.menu a{
margin:10px 15px 0 0;
font-size:14px;
}

.hero{
padding:70px 15px;
}

.hero h1{
font-size:28px;
}

.hero p{
font-size:16px;
}

.botao{
font-size:16px;
padding:14px 30px;
}

.stats{
gap:30px;
}

.stat{
font-size:28px;
}

.cards{
flex-direction:column;
align-items:center;
}

.card{
width:90%;
}

.whatsapp{
width:55px;
height:55px;
bottom:20px;
right:20px;
}

.whatsapp img{
width:30px;
}

}

</style>
